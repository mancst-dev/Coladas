<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Descarga...</title>
</head>
<body>
    <h1>Preparando Descarga...</h1>
    <p>La descarga del archivo "{{ original_name }}.xlsx" debería comenzar en breve.</p>
    <p>Serás redirigido a la página principal automáticamente.</p>

    <script>
        //obtener url de la descarga real
        var downloadUrl = "{{ url_for('archivo_descarga', filename=filename, original_name=original_name) }}";

        //crearenlace de descarga invisible
        var link = document.createElement('a');
        link.href = downloadUrl;
        link.download = "{{ original_name }}.xlsx";
        document.body.appendChild(link);
        
        //simularunclic para iniciar la descarga
        link.click();
        
        //limpiar enlace
        document.body.removeChild(link);

        //redirigir a(index) después de un pequeño retraso
        setTimeout(function() {
            window.location.href = "{{ url_for('index') }}";
        }, 1500); 
    </script>
</body>
</html>
